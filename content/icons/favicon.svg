<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Four tab cards arranged in a 2×2 grid, suggesting "grouped" -->
  <!-- Top-left group (blue, same collection) -->
  <rect x="2" y="2" width="20" height="13" rx="2.5" fill="#4D6B8A"/>
  <rect x="2" y="17" width="20" height="13" rx="2.5" fill="#4D6B8A" opacity="0.7"/>
  <!-- Top-right group (muted, different collection) -->
  <rect x="26" y="2" width="20" height="13" rx="2.5" fill="#9AAABB"/>
  <rect x="26" y="17" width="20" height="13" rx="2.5" fill="#9AAABB" opacity="0.7"/>
  <!-- Bottom row: tab bar strip hinting at reorder -->
  <rect x="2" y="33" width="44" height="6" rx="2" fill="#C0C8D4"/>
  <rect x="2" y="33" width="20" height="6" rx="2" fill="#4D6B8A" opacity="0.5"/>
  <!-- Tiny lines on cards suggesting text content -->
  <rect x="5" y="6" width="10" height="1.5" rx="0.75" fill="white" opacity="0.7"/>
  <rect x="5" y="9" width="7" height="1.5" rx="0.75" fill="white" opacity="0.4"/>
  <rect x="5" y="21" width="10" height="1.5" rx="0.75" fill="white" opacity="0.7"/>
  <rect x="5" y="24" width="7" height="1.5" rx="0.75" fill="white" opacity="0.4"/>
  <rect x="29" y="6" width="10" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
  <rect x="29" y="9" width="7" height="1.5" rx="0.75" fill="white" opacity="0.3"/>
  <rect x="29" y="21" width="10" height="1.5" rx="0.75" fill="white" opacity="0.5"/>
  <rect x="29" y="24" width="7" height="1.5" rx="0.75" fill="white" opacity="0.3"/>
  <!-- Arrow hint in the bottom-right corner -->
  <g transform="translate(34,38)" fill="#4D6B8A" opacity="0.85">
    <polygon points="0,4 4,0 8,4 5.5,4 5.5,8 2.5,8 2.5,4" />
  </g>
</svg>
